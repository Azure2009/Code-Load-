{% extends 'base.html' %}

{% block head %} 



{% endblock %}

{% block body %}

    <h3>Case Problems</h3>

    <h1>Python<span><h1 class="python-logo"></h1></span></h1></h1>

    <br>

    <div class="python_container">

        {% for problem in case_problems_list %}

        <ol>
                      
            <div class="problem-card">

                <div>

                    <h3>{{problem.title}}</h3>

                    <p>
                        {{problem.difficulty}}
                        •
                        {{status_list[loop.index0]}}
                    </p>

                </div>

                <a href="/case_problems/solving-page/{{problem.id}}">
                    Solve →
                </a>

            </div>

        </ol>

        {% endfor %}

    </div>

{% endblock %}
