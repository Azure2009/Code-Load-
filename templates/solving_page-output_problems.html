{% extends 'base.html' %}

{% block head %} 



{% endblock %}

{% block body %}

    <a href="/output_problems" class="home-btn" aria-label="Home">
        <span>←</span>
    </a>

    <div class="main_Container">

        <div id="title">
            <h1>{{problem.problem_title}}</h1>
        </div>

        <div id="description">
            <h3>{{problem.problem_description}}</h3>
        </div>

        <div id="problem">
            
            <pre>{{problem.problem_set | e}}</pre>
        </div>

        <div id="solving_area_container">
            
            <form action="/output_problems/solving_page/{{problem.problem_id}}" method='POST'>
            <textarea name='submission' rows="10" cols="50" id="textarea"></textarea>
            <input type="submit" value="Submit">
            </form>

        </div>

    </div>


{% endblock %}
