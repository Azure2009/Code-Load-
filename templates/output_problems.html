{% extends 'base.html' %}

{% block head %} 

{% endblock %}

{% block body %}

    <a href="/dashboard" class="home-btn" aria-label="Home">
        <span>←</span>
    </a>

    <h3>Output Problems</h3>

    <h1>Python <span><h1 class="python-logo"></h1></span></h1></h1>

    <br>

    <div class="python_container">

        {% for problem in problems_list %}

        <ol>
                      
            <div class="problem-card">

                <div>

                    <h3>{{problem.problem_title}}</h3>

                    <p>
                        {{problem.difficulty}}
                        •
                        {{status_list[loop.index0]}}
                    </p>

                </div>

                <a href="/output_problems/solving_page/{{problem.problem_id}}">
                    Solve →
                </a>

            </div>

        </ol>

        {% endfor %}

    </div>

{% endblock %}
