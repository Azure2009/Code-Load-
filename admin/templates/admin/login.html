{% extends 'admin/base.html' %}

{% block head %} 

{{ super() }} <!-- keeps the CSS link from base.html -->


{% endblock %}

{% block body %}

<a href="/" class="home-btn" aria-label="Home">
    <span>⌂</span>
</a>

<div class="admin">

<div class="auth-card">

<p class="page-eyebrow">Administrator Access</p>

<h1>Sign in</h1>

<form action='/admin/' method='POST' autocomplete="off">

    <label>Username</label>
    <input type="text" name="username" required>
    <br>
    <br>
    <label>Password</label>
    <input type="password" name="password" required>
    <br>
    <br>
    <input type="submit" value="Continue">

</form>

</div>

</div>

{% endblock %}
